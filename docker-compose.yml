services:
  postgres:
    image: postgres:16-alpine
    container_name: blogging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-blogging_website}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blogging-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blogging-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET:-change-me-before-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-blogging_website}
    ports:
      - "${PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${PORT:-5000}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - blogging-network

  frontend:
    build:
      context: ./blogging-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: blogging-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - blogging-network

volumes:
  postgres_data:

networks:
  blogging-network:
    driver: bridge
